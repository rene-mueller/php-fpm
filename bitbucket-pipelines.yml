image: atlassian/default-image:2

options:
  docker: true

pipelines:
  default:
    - step:
        name: Lint the Dockerfile
        image: hadolint/hadolint:latest-debian
        script:
          - hadolint --ignore DL3008 --ignore DL3022 Dockerfile
          - hadolint --ignore DL3008 --ignore DL3022 **/Dockerfile
    - parallel:
        - step:
            name: Build and Test PHP 7.3
            script:
              - IMAGE_NAME=$BITBUCKET_REPO_SLUG
              - VERSION=7.3
              - IMAGE=${DOCKER_REPOSITORY}/docker/${IMAGE_NAME}
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}:${VERSION}" .
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-dev:${VERSION}" ./development
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-prod:${VERSION}" ./production
            caches:
              - docker
        - step:
            name: Build and Test PHP 7.4
            script:
              - IMAGE_NAME=$BITBUCKET_REPO_SLUG
              - VERSION=7.4
              - IMAGE=${DOCKER_REPOSITORY}/docker/${IMAGE_NAME}
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}:${VERSION}" .
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-dev:${VERSION}" ./development
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-prod:${VERSION}" ./production
            caches:
              - docker
        - step:
            name: Build and Test PHP 8.0
            script:
              - IMAGE_NAME=$BITBUCKET_REPO_SLUG
              - VERSION=8.0
              - IMAGE=${DOCKER_REPOSITORY}/docker/${IMAGE_NAME}
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}:${VERSION}" .
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-dev:${VERSION}" ./development
              - docker buildx build --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-prod:${VERSION}" ./production
            caches:
              - docker
  branches:
    master:
      - parallel:
        - step:
            name: Deploy PHP 7.3
            script:
              - IMAGE_NAME=$BITBUCKET_REPO_SLUG
              - VERSION=7.3
              - IMAGE=${DOCKER_REPOSITORY}/docker/${IMAGE_NAME}
              - echo ${DOCKER_PASSWORD} | docker login ${DOCKER_REPOSITORY} --username "${DOCKER_USERNAME}" --password-stdin
              - docker buildx build . --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}:${VERSION}" --push
              - docker buildx build ./development --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-dev:${VERSION}" --push
              - docker buildx build ./production --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-prod:${VERSION}" --push
            caches:
              - docker
        - step:
            name: Deploy PHP 7.4
            script:
              - IMAGE_NAME=$BITBUCKET_REPO_SLUG
              - VERSION=7.4
              - IMAGE=${DOCKER_REPOSITORY}/docker/${IMAGE_NAME}
              - echo ${DOCKER_PASSWORD} | docker login ${DOCKER_REPOSITORY} --username "${DOCKER_USERNAME}" --password-stdin
              - docker buildx build . --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}:${VERSION}" --push
              - docker buildx build ./development --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-dev:${VERSION}" --push
              - docker buildx build ./production --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-prod:${VERSION}" --push
            caches:
              - docker
        - step:
            name: Deploy PHP 8.0
            script:
              - IMAGE_NAME=$BITBUCKET_REPO_SLUG
              - VERSION=8.0
              - IMAGE=${DOCKER_REPOSITORY}/docker/${IMAGE_NAME}
              - echo ${DOCKER_PASSWORD} | docker login ${DOCKER_REPOSITORY} --username "${DOCKER_USERNAME}" --password-stdin
              - docker buildx build . --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}:${VERSION}" --push
              - docker buildx build ./development --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-dev:${VERSION}" --push
              - docker buildx build ./production --platform linux/amd64,linux/arm64 --build-arg PHP_VERSION=${VERSION} --tag "${IMAGE}-prod:${VERSION}" --push
            caches:
              - docker